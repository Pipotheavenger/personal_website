# Despliega el sitio estático en GitHub Pages (rama gh-pages).
# Si el repo es username.github.io, cambia la rama de deploy a main y la URL será la raíz.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Project Pages: https://username.github.io/<repo>/
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # GitHub Pages (Jekyll) ignores folders starting with "_" (e.g. /_next).
          # This creates a .nojekyll file so JS/CSS assets are served correctly.
          enable_jekyll: false
          # Si el sitio está en la raíz (username.github.io), descomenta y usa:
          # publish_branch: main
          # destination_dir: .
