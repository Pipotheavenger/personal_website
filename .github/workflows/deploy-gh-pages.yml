# Despliega el sitio estático en GitHub Pages (rama gh-pages).
# Si el repo es username.github.io, cambia la rama de deploy a main y la URL será la raíz.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Compute Pages base path
        id: pages
        shell: bash
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          if [[ -n "${CUSTOM_DOMAIN}" ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "cname=${CUSTOM_DOMAIN}" >> "$GITHUB_OUTPUT"
            echo "mode=custom-domain" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
            echo "cname=" >> "$GITHUB_OUTPUT"
            echo "mode=project-pages" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          # If CUSTOM_DOMAIN is set, build for root (/). Otherwise build for /<repo>/.
          GITHUB_PAGES_BASE: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # GitHub Pages (Jekyll) ignores folders starting with "_" (e.g. /_next).
          # This creates a .nojekyll file so JS/CSS assets are served correctly.
          enable_jekyll: false
          # When using a custom domain, publish CNAME automatically.
          cname: ${{ steps.pages.outputs.cname }}
          # Si el sitio está en la raíz (username.github.io), descomenta y usa:
          # publish_branch: main
          # destination_dir: .
