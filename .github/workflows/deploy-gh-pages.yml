# Despliega el sitio estático en GitHub Pages (rama gh-pages).
# Si el repo es username.github.io, cambia la rama de deploy a main y la URL será la raíz.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        # Si usas subruta (ej. /personal_website), crea .env.production con GITHUB_PAGES_BASE=/personal_website

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # Si el sitio está en la raíz (username.github.io), descomenta y usa:
          # publish_branch: main
          # destination_dir: .
